<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D1B3E">
<meta name="description" content="RAS Pre तैयारी — Quiz App">
<link rel="manifest" href="manifest.json">
<title>RAS Pre</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --saffron:#FF6B00;--gold:#FFB300;--deep-navy:#0D1B3E;
  --navy:#1a2a5e;--light-navy:#2a3f7e;--royal:#3355aa;
  --green:#00C853;--red:#FF1744;--text:#1a0a3e;--muted:#5a5a7a;
  --card:#fff;--shadow:0 6px 24px rgba(13,27,62,.15);--r:14px;--t:.22s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Devanagari',sans-serif;background:linear-gradient(135deg,#0D1B3E,#1a2a5e 50%,#2a1060);min-height:100vh;color:var(--text)}

/* ── HEADER ── */
.hdr{background:linear-gradient(90deg,#0D1B3E,#1a2a5e);border-bottom:3px solid var(--saffron);position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.hdr-in{max-width:1200px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:42px;height:42px;background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-tx .t1{color:#fff;font-size:1rem;font-weight:700;letter-spacing:.5px}
.logo-tx .t2{color:var(--gold);font-size:.68rem;font-weight:500}

/* ── LAYOUT ── */
.app{max-width:1200px;margin:0 auto;padding:14px 14px}

/* ── CARD ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:13px}
.ctitle{font-size:.95rem;font-weight:700;color:var(--deep-navy);border-left:4px solid var(--saffron);padding-left:9px;margin-bottom:13px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:.88rem;cursor:pointer;transition:var(--t);width:100%}
.btn-primary{background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;box-shadow:0 4px 14px rgba(255,107,0,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(255,107,0,.45)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-google{background:#fff;color:var(--text);border:1.5px solid #ddd}
.btn-link{background:transparent;color:var(--royal);font-weight:600;font-size:.82rem;width:auto;padding:6px 0}

/* ── AUTH ── */
.auth-wrap{min-height:calc(100vh - 70px);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--card);border-radius:18px;box-shadow:0 16px 50px rgba(0,0,0,.3);padding:30px 26px;max-width:380px;width:100%}
.auth-logo{text-align:center;margin-bottom:6px;font-size:2.1rem}
.auth-title{text-align:center;font-size:1.15rem;font-weight:800;color:var(--deep-navy);margin-bottom:3px}
.auth-sub{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:5px}
.field input{width:100%;padding:11px 13px;border:1.5px solid #e0e4f0;border-radius:9px;font-family:inherit;font-size:.88rem;outline:none;transition:var(--t)}
.field input:focus{border-color:var(--saffron)}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:.75rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#e0e4f0}
.auth-switch{text-align:center;margin-top:16px;font-size:.82rem;color:var(--muted)}
.auth-switch a{color:var(--saffron);font-weight:700;cursor:pointer;text-decoration:none}
.auth-msg{padding:9px 12px;border-radius:8px;font-size:.78rem;margin-bottom:14px;display:none}
.auth-msg.show{display:block}
.auth-msg.err{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.auth-msg.ok{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.google-note{font-size:.7rem;color:var(--muted);text-align:center;margin-top:4px}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HOME (placeholder) ── */
.home-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:20px;text-align:center}
.home-wrap .card{max-width:420px}

/* ── TOAST ── */
.toast-box{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--deep-navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:.83rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);opacity:0;transform:translateY(10px);transition:all .25s ease;max-width:90vw}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-left:4px solid var(--green)}
.toast.err{border-left:4px solid var(--red)}

/* ── DASHBOARD GRID ── */
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:16px}
.dcard{background:linear-gradient(135deg,var(--navy),var(--light-navy));border-radius:13px;padding:18px 15px;color:#fff;text-align:center;cursor:pointer;transition:var(--t);border:1px solid rgba(255,255,255,.1)}
.dcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.3)}
.dcard .ic{font-size:1.9rem;margin-bottom:6px}
.dcard .nm{font-size:.92rem;font-weight:700;color:var(--gold)}
.dcard .lb{font-size:.7rem;color:rgba(255,255,255,.72);margin-top:2px}

/* ── BREADCRUMB ── */
.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.82rem;color:var(--muted);margin-bottom:14px}
.crumb span{cursor:pointer;color:var(--royal);font-weight:600}
.crumb span.cur{color:var(--text);cursor:default;font-weight:700}

/* ── TREE LIST (Syllabus Manager) ── */
.tree-item{background:#f7f8fc;border:1px solid #e8eaf5;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:var(--t)}
.tree-item:hover{background:#eef0fa;border-color:var(--saffron)}
.tree-item .ti-name{font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:8px}
.tree-item .ti-count{font-size:.7rem;color:var(--muted);background:#fff;padding:2px 8px;border-radius:20px}
.tree-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;font-size:.95rem;padding:5px 7px;border-radius:6px;transition:var(--t);width:auto}
.icon-btn:hover{background:#fff;transform:scale(1.1)}
.icon-btn.del:hover{background:#ffebee}

/* ── ADD ROW ── */
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;padding:11px 13px;border:1.5px solid #e0e4f0;border-radius:9px;font-family:inherit;font-size:.86rem;outline:none}
.add-row input:focus{border-color:var(--saffron)}
.add-row button{width:auto;padding:11px 16px;flex-shrink:0}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:30px 15px;color:var(--muted);font-size:.85rem}
.empty-state .em-ic{font-size:2.2rem;margin-bottom:8px;opacity:.5}

/* ── INLINE EDIT ── */
.edit-input{flex:1;padding:7px 10px;border:1.5px solid var(--saffron);border-radius:7px;font-family:inherit;font-size:.86rem;outline:none}

/* ── MODAL CONFIRM ── */
.modal-overlay{position:fixed;inset:0;background:rgba(13,27,62,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-box h3{font-size:1rem;color:var(--deep-navy);margin-bottom:8px}
.modal-box p{font-size:.83rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{padding:10px}
.btn-secondary{background:#f0f1f7;color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
</style>
</head>
<body>

<!-- ══════════════════ HEADER ══════════════════ -->
<div class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-ic">📘</div>
      <div class="logo-tx">
        <div class="t1">RAS Pre</div>
        <div class="t2">तैयारी परीक्षा हेतु</div>
      </div>
    </div>
    <div id="hdrUserBox" style="display:none;color:#fff;font-size:.78rem;cursor:pointer" onclick="logout()">🚪 Logout</div>
  </div>
</div>

<!-- ══════════════════ APP ROOT ══════════════════ -->
<div class="app" id="appRoot">
  <!-- यहाँ JS से auth-screen या home-screen render होगी -->
</div>

<!-- ══════════════════ TOAST ══════════════════ -->
<div class="toast-box" id="toastBox"></div>

<script>
// ══════════════════════════════════════════════
// SECTION: SUPABASE INIT
// ══════════════════════════════════════════════
// नया Supabase project बनाने के बाद यहाँ डालें (Project Settings → API):
const SB_URL = 'https://wfpqiymuxbiqdqzkahio.supabase.co';
const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcHFpeW11eGJpcWRxemthaGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Nzg4MTYsImV4cCI6MjA5NzE1NDgxNn0.dIlG-XqxhKECO_LrCU2AmuPAxyO14w4c_UGWJQb2Sx0';
const sb = supabase.createClient(SB_URL, SB_ANON_KEY);

// ══════════════════════════════════════════════
// SECTION: TOAST UTILITY
// ══════════════════════════════════════════════
function showToast(msg, type='ok') {
  const box = document.getElementById('toastBox');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  box.appendChild(t);
  setTimeout(()=>t.classList.add('show'), 10);
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 300); }, 3000);
}

// ══════════════════════════════════════════════
// SECTION: AUTH STATE
// ══════════════════════════════════════════════
let currentUser = null;
let currentProfile = null;
let authMode = 'login'; // 'login' | 'signup' | 'forgot'

async function initAuth() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    currentUser = data.session.user;
    await loadProfile();
    renderHome();
  } else {
    renderAuth();
  }

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      loadProfile().then(renderHome);
    }
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      currentProfile = null;
      renderAuth();
    }
  });
}

async function loadProfile() {
  const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (!error) currentProfile = data;
}

// ══════════════════════════════════════════════
// SECTION: AUTH SCREEN (Login / Signup / Forgot)
// ══════════════════════════════════════════════
function renderAuth() {
  document.getElementById('hdrUserBox').style.display = 'none';
  const root = document.getElementById('appRoot');

  if (authMode === 'signup') {
    root.innerHTML = `
    <div class="auth-wrap"><div class="auth-card">
      <div class="auth-logo">📘</div>
      <div class="auth-title">नया Account बनाएं</div>
      <div class="auth-sub">RAS Pre तैयारी शुरू करें</div>
      <div class="auth-msg" id="authMsg"></div>
      <div class="field"><label>पूरा नाम</label><input type="text" id="suName" placeholder="अपना नाम लिखें"></div>
      <div class="field"><label>Email</label><input type="email" id="suEmail" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="suPass" placeholder="कम से कम 6 अक्षर"></div>
      <button class="btn btn-primary" id="suBtn" onclick="doSignup()">Account बनाएं</button>
      <div class="auth-divider">या</div>
      <button class="btn btn-google" disabled>🔵 Google से जारी रखें</button>
      <div class="google-note">Google Login जल्द आ रहा है</div>
      <div class="auth-switch">पहले से Account है? <a onclick="authMode='login';renderAuth()">Login करें</a></div>
    </div></div>`;
    return;
  }

  if (authMode === 'forgot') {
    root.innerHTML = `
    <div class="auth-wrap"><div class="auth-card">
      <div class="auth-logo">🔑</div>
      <div class="auth-title">Password भूल गए?</div>
      <div class="auth-sub">अपना email डालें, reset link भेजेंगे</div>
      <div class="auth-msg" id="authMsg"></div>
      <div class="field"><label>Email</label><input type="email" id="fgEmail" placeholder="you@example.com"></div>
      <button class="btn btn-primary" id="fgBtn" onclick="doForgotPassword()">Reset Link भेजें</button>
      <div class="auth-switch">याद आ गया? <a onclick="authMode='login';renderAuth()">Login करें</a></div>
    </div></div>`;
    return;
  }

  // default: login
  root.innerHTML = `
  <div class="auth-wrap"><div class="auth-card">
    <div class="auth-logo">📘</div>
    <div class="auth-title">RAS Pre में Login करें</div>
    <div class="auth-sub">अपनी तैयारी जारी रखें</div>
    <div class="auth-msg" id="authMsg"></div>
    <div class="field"><label>Email</label><input type="email" id="liEmail" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="liPass" placeholder="अपना password डालें"></div>
    <button class="btn btn-primary" id="liBtn" onclick="doLogin()">Login करें</button>
    <div style="text-align:center;margin-top:10px"><a class="btn-link" onclick="authMode='forgot';renderAuth()">Password भूल गए?</a></div>
    <div class="auth-divider">या</div>
    <button class="btn btn-google" disabled>🔵 Google से जारी रखें</button>
    <div class="google-note">Google Login जल्द आ रहा है</div>
    <div class="auth-switch">Account नहीं है? <a onclick="authMode='signup';renderAuth()">नया बनाएं</a></div>
  </div></div>`;
}

function setAuthMsg(text, type) {
  const el = document.getElementById('authMsg');
  if (!el) return;
  el.textContent = text;
  el.className = 'auth-msg show ' + type;
}

function setBtnLoading(id, loading, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' : label;
}

async function doSignup() {
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pass = document.getElementById('suPass').value;
  if (!name || !email || !pass) { setAuthMsg('कृपया सभी फ़ील्ड भरें।', 'err'); return; }
  if (pass.length < 6) { setAuthMsg('Password कम से कम 6 अक्षर का हो।', 'err'); return; }

  setBtnLoading('suBtn', true);
  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name } }
  });
  setBtnLoading('suBtn', false, 'Account बनाएं');

  if (error) { setAuthMsg(error.message, 'err'); return; }
  setAuthMsg('✅ Account बन गया! अब Login करें।', 'ok');
  showToast('Account सफलतापूर्वक बना!', 'ok');
  setTimeout(()=>{ authMode='login'; renderAuth(); }, 1500);
}

async function doLogin() {
  const email = document.getElementById('liEmail').value.trim();
  const pass = document.getElementById('liPass').value;
  if (!email || !pass) { setAuthMsg('कृपया Email और Password डालें।', 'err'); return; }

  setBtnLoading('liBtn', true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  setBtnLoading('liBtn', false, 'Login करें');

  if (error) { setAuthMsg('Email या Password गलत है।', 'err'); return; }
  showToast('Login सफल!', 'ok');
}

async function doForgotPassword() {
  const email = document.getElementById('fgEmail').value.trim();
  if (!email) { setAuthMsg('कृपया Email डालें।', 'err'); return; }

  setBtnLoading('fgBtn', true);
  const { error } = await sb.auth.resetPasswordForEmail(email);
  setBtnLoading('fgBtn', false, 'Reset Link भेजें');

  if (error) { setAuthMsg(error.message, 'err'); return; }
  setAuthMsg('✅ Reset link आपके email पर भेज दिया गया है।', 'ok');
}

async function logout() {
  await sb.auth.signOut();
  showToast('Logout हो गया', 'ok');
}

// ══════════════════════════════════════════════
// SECTION: HOME (Dashboard)
// ══════════════════════════════════════════════
function renderHome() {
  document.getElementById('hdrUserBox').style.display = 'block';
  const root = document.getElementById('appRoot');
  const isAdmin = currentProfile?.role === 'admin';
  root.innerHTML = `
  <div class="card">
    <div class="ctitle">स्वागत है, ${currentProfile?.full_name || 'दोस्त'}! 🙏</div>
    <div class="dgrid">
      ${isAdmin ? `
      <div class="dcard" onclick="goSyllabusManager()">
        <div class="ic">📚</div>
        <div class="nm">सिलेबस</div>
        <div class="lb">Subject/Topic Manage</div>
      </div>` : ''}
      <div class="dcard" style="opacity:.5;cursor:default">
        <div class="ic">📝</div>
        <div class="nm">क्विज़</div>
        <div class="lb">आगे की session में</div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// SECTION: SYLLABUS MANAGER (Admin only)
// — Subject → Topic → Micro-topic, tree-structure
// ══════════════════════════════════════════════
let smLevel = 'subjects';   // 'subjects' | 'topics' | 'microtopics'
let smSubject = null;       // selected subject {id,name}
let smTopic = null;         // selected topic {id,name}
let smCache = { subjects: [], topics: [], microtopics: [] };

function goSyllabusManager() {
  smLevel = 'subjects';
  smSubject = null;
  smTopic = null;
  loadSubjects();
}

async function loadSubjects() {
  renderSyllabusShell('लोड हो रहा है...');
  const { data, error } = await sb.from('subjects').select('*').order('sort_order');
  if (error) { showToast('Subjects लोड नहीं हुए: ' + error.message, 'err'); return; }
  smCache.subjects = data || [];
  // हर subject के अंदर topic count गिनने के लिए
  const { data: allTopics } = await sb.from('topics').select('id, subject_id');
  smCache._topicCounts = {};
  (allTopics || []).forEach(t => { smCache._topicCounts[t.subject_id] = (smCache._topicCounts[t.subject_id] || 0) + 1; });
  smLevel = 'subjects';
  renderSyllabusManager();
}

async function loadTopics(subject) {
  smSubject = subject;
  renderSyllabusShell('लोड हो रहा है...');
  const { data, error } = await sb.from('topics').select('*').eq('subject_id', subject.id).order('sort_order');
  if (error) { showToast('Topics लोड नहीं हुए: ' + error.message, 'err'); return; }
  smCache.topics = data || [];
  const { data: allMicro } = await sb.from('micro_topics').select('id, topic_id');
  smCache._microCounts = {};
  (allMicro || []).forEach(m => { smCache._microCounts[m.topic_id] = (smCache._microCounts[m.topic_id] || 0) + 1; });
  smLevel = 'topics';
  renderSyllabusManager();
}

async function loadMicroTopics(topic) {
  smTopic = topic;
  renderSyllabusShell('लोड हो रहा है...');
  const { data, error } = await sb.from('micro_topics').select('*').eq('topic_id', topic.id).order('sort_order');
  if (error) { showToast('Micro-topics लोड नहीं हुए: ' + error.message, 'err'); return; }
  smCache.microtopics = data || [];
  smLevel = 'microtopics';
  renderSyllabusManager();
}

function renderSyllabusShell(msg) {
  document.getElementById('appRoot').innerHTML = `<div class="card"><p style="color:var(--muted);font-size:.85rem">${msg}</p></div>`;
}

function smCrumbHtml() {
  let html = `<div class="crumb">`;
  html += `<span onclick="renderHome()">🏠 होम</span> ›`;
  html += smLevel === 'subjects'
    ? ` <span class="cur">सिलेबस</span>`
    : ` <span onclick="loadSubjects()">सिलेबस</span> ›`;
  if (smLevel === 'topics') html += ` <span class="cur">${smSubject.name}</span>`;
  if (smLevel === 'microtopics') {
    html += ` <span onclick="loadTopics(smSubject)">${smSubject.name}</span> › <span class="cur">${smTopic.name}</span>`;
  }
  html += `</div>`;
  return html;
}

function renderSyllabusManager() {
  const root = document.getElementById('appRoot');

  if (smLevel === 'subjects') {
    const rows = smCache.subjects.length ? smCache.subjects.map(s => `
      <div class="tree-item" id="row-${s.id}">
        <div class="ti-name" onclick="loadTopicsById('${s.id}')">📖 <span id="name-${s.id}">${s.name}</span>
          <span class="ti-count">${smCache._topicCounts[s.id] || 0} topics</span>
        </div>
        <div class="tree-actions">
          <button class="icon-btn" onclick="event.stopPropagation();startEditSubject('${s.id}','${s.name.replace(/'/g,"\\'")}')">✏️</button>
          <button class="icon-btn del" onclick="event.stopPropagation();confirmDelete('subject','${s.id}','${s.name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>`).join('') : `<div class="empty-state"><div class="em-ic">📭</div>अभी कोई Subject नहीं है। नीचे से जोड़ें।</div>`;

    root.innerHTML = `
    <div class="card">
      ${smCrumbHtml()}
      <div class="ctitle">📚 सिलेबस — Subjects</div>
      ${rows}
      <div class="add-row">
        <input type="text" id="newSubjectInput" placeholder="नया Subject नाम लिखें (जैसे: इतिहास)">
        <button class="btn btn-primary" onclick="addSubject()">+ जोड़ें</button>
      </div>
    </div>`;
    return;
  }

  if (smLevel === 'topics') {
    const rows = smCache.topics.length ? smCache.topics.map(t => `
      <div class="tree-item" id="row-${t.id}">
        <div class="ti-name" onclick="loadMicroTopics(${JSON.stringify(t).replace(/"/g, '&quot;')})">📑 <span id="name-${t.id}">${t.name}</span>
          <span class="ti-count">${smCache._microCounts[t.id] || 0} micro-topics</span>
        </div>
        <div class="tree-actions">
          <button class="icon-btn" onclick="event.stopPropagation();startEditTopic('${t.id}','${t.name.replace(/'/g,"\\'")}')">✏️</button>
          <button class="icon-btn del" onclick="event.stopPropagation();confirmDelete('topic','${t.id}','${t.name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>`).join('') : `<div class="empty-state"><div class="em-ic">📭</div>इस Subject में अभी कोई Topic नहीं है।</div>`;

    root.innerHTML = `
    <div class="card">
      ${smCrumbHtml()}
      <div class="ctitle">📑 ${smSubject.name} — Topics</div>
      ${rows}
      <div class="add-row">
        <input type="text" id="newTopicInput" placeholder="नया Topic नाम लिखें (जैसे: प्राचीन भारत)">
        <button class="btn btn-primary" onclick="addTopic()">+ जोड़ें</button>
      </div>
    </div>`;
    return;
  }

  if (smLevel === 'microtopics') {
    const rows = smCache.microtopics.length ? smCache.microtopics.map(m => `
      <div class="tree-item" style="cursor:default" id="row-${m.id}">
        <div class="ti-name">📄 <span id="name-${m.id}">${m.name}</span></div>
        <div class="tree-actions">
          <button class="icon-btn" onclick="startEditMicro('${m.id}','${m.name.replace(/'/g,"\\'")}')">✏️</button>
          <button class="icon-btn del" onclick="confirmDelete('microtopic','${m.id}','${m.name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>`).join('') : `<div class="empty-state"><div class="em-ic">📭</div>इस Topic में अभी कोई Micro-topic नहीं है।</div>`;

    root.innerHTML = `
    <div class="card">
      ${smCrumbHtml()}
      <div class="ctitle">📄 ${smTopic.name} — Micro-topics</div>
      ${rows}
      <div class="add-row">
        <input type="text" id="newMicroInput" placeholder="नया Micro-topic नाम लिखें (जैसे: सिंधु घाटी सभ्यता)">
        <button class="btn btn-primary" onclick="addMicroTopic()">+ जोड़ें</button>
      </div>
    </div>`;
    return;
  }
}

// ── ADD ──
async function addSubject() {
  const input = document.getElementById('newSubjectInput');
  const name = input.value.trim();
  if (!name) { showToast('नाम लिखें', 'err'); return; }
  const sort_order = smCache.subjects.length;
  const { error } = await sb.from('subjects').insert({ name, sort_order });
  if (error) { showToast('जोड़ने में दिक्कत: ' + error.message, 'err'); return; }
  showToast('Subject जुड़ गया ✅', 'ok');
  loadSubjects();
}

async function addTopic() {
  const input = document.getElementById('newTopicInput');
  const name = input.value.trim();
  if (!name) { showToast('नाम लिखें', 'err'); return; }
  const sort_order = smCache.topics.length;
  const { error } = await sb.from('topics').insert({ name, subject_id: smSubject.id, sort_order });
  if (error) { showToast('जोड़ने में दिक्कत: ' + error.message, 'err'); return; }
  showToast('Topic जुड़ गया ✅', 'ok');
  loadTopics(smSubject);
}

async function addMicroTopic() {
  const input = document.getElementById('newMicroInput');
  const name = input.value.trim();
  if (!name) { showToast('नाम लिखें', 'err'); return; }
  const sort_order = smCache.microtopics.length;
  const { error } = await sb.from('micro_topics').insert({ name, topic_id: smTopic.id, sort_order });
  if (error) { showToast('जोड़ने में दिक्कत: ' + error.message, 'err'); return; }
  showToast('Micro-topic जुड़ गया ✅', 'ok');
  loadMicroTopics(smTopic);
}

// ── EDIT (inline) ──
function startEditSubject(id, oldName) { startInlineEdit(id, oldName, 'subjects'); }
function startEditTopic(id, oldName) { startInlineEdit(id, oldName, 'topics'); }
function startEditMicro(id, oldName) { startInlineEdit(id, oldName, 'micro_topics'); }

function startInlineEdit(id, oldName, table) {
  const nameSpan = document.getElementById('name-' + id);
  if (!nameSpan) return;
  nameSpan.outerHTML = `<input class="edit-input" id="edit-${id}" value="${oldName.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveInlineEdit('${id}','${table}')">`;
  document.getElementById('edit-' + id).focus();
  const row = document.getElementById('row-' + id);
  const actions = row.querySelector('.tree-actions');
  actions.innerHTML = `
    <button class="icon-btn" onclick="saveInlineEdit('${id}','${table}')">✅</button>
    <button class="icon-btn" onclick="${table==='subjects'?'loadSubjects()':table==='topics'?'loadTopics(smSubject)':'loadMicroTopics(smTopic)'}">✖️</button>`;
}

async function saveInlineEdit(id, table) {
  const input = document.getElementById('edit-' + id);
  const newName = input.value.trim();
  if (!newName) { showToast('नाम खाली नहीं हो सकता', 'err'); return; }
  const { error } = await sb.from(table).update({ name: newName }).eq('id', id);
  if (error) { showToast('Update नहीं हुआ: ' + error.message, 'err'); return; }
  showToast('अपडेट हो गया ✅', 'ok');
  if (table === 'subjects') loadSubjects();
  else if (table === 'topics') loadTopics(smSubject);
  else loadMicroTopics(smTopic);
}

// ── DELETE (confirm modal) ──
let pendingDelete = null;
function confirmDelete(type, id, name) {
  pendingDelete = { type, id };
  const warnMap = {
    subject: 'इसके अंदर के सभी Topics, Micro-topics और Questions भी डिलीट हो जाएंगे।',
    topic: 'इसके अंदर के सभी Micro-topics और Questions भी डिलीट हो जाएंगे।',
    microtopic: 'इसके अंदर के सभी Questions भी डिलीट हो जाएंगे।'
  };
  document.body.insertAdjacentHTML('beforeend', `
  <div class="modal-overlay" id="delModal">
    <div class="modal-box">
      <h3>⚠️ "${name}" डिलीट करें?</h3>
      <p>${warnMap[type]} यह पलटा नहीं जा सकता।</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">रद्द करें</button>
        <button class="btn btn-danger" onclick="doDelete()">हाँ, डिलीट करें</button>
      </div>
    </div>
  </div>`);
}

function closeDeleteModal() {
  document.getElementById('delModal')?.remove();
  pendingDelete = null;
}

async function doDelete() {
  if (!pendingDelete) return;
  const tableMap = { subject: 'subjects', topic: 'topics', microtopic: 'micro_topics' };
  const { error } = await sb.from(tableMap[pendingDelete.type]).delete().eq('id', pendingDelete.id);
  closeDeleteModal();
  if (error) { showToast('डिलीट नहीं हुआ: ' + error.message, 'err'); return; }
  showToast('डिलीट हो गया ✅', 'ok');
  if (pendingDelete.type === 'subject') loadSubjects();
  else if (pendingDelete.type === 'topic') loadTopics(smSubject);
  else loadMicroTopics(smTopic);
}
